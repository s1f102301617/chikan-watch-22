<style>
    body { background: #0e0e10; color: #efeff1; font-family: sans-serif; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #9146ff; }
    .section-title { border-bottom: 2px solid #333; margin: 30px 0 15px; padding-bottom: 5px; font-size: 1.2em; color: #adadb8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    
    /* カードのデザイン */
    .card { background: #1f1f23; border-radius: 8px; overflow: hidden; text-decoration: none; color: white; display: flex; padding: 10px; transition: 0.2s; border: 1px solid transparent; }
    .card:hover { background: #26262c; border-color: #9146ff; transform: translateY(-2px); }
    .card.live { border-left: 4px solid #e91916; }

    /* アイコンと中身 */
    .avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; background: #333; }
    .info { flex: 1; min-width: 0; }
    .name { font-weight: bold; font-size: 1.1em; display: flex; align-items: center; justify-content: space-between; }
    
    /* 配信中情報のデザイン */
    .game { color: #adadb8; font-size: 0.85em; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .title { font-size: 0.8em; color: #dedee3; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .viewers { color: #e91916; font-size: 0.8em; font-weight: bold; margin-top: 5px; }

    .label { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .label-live { background: #e91916; color: white; }
    .label-off { background: #333; color: #adadb8; }
</style>
