<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>置換界隈LIVE状況</title>
    <style>
        /* 全体のデザイン設定 */
        body { 
            background: #0e0e10; 
            color: #efeff1; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        
        h1 { 
            text-align: center; 
            color: #9146ff; 
            margin-bottom: 30px;
        }

        /* セクション（配信中・オフライン）の見出し */
        .section-title { 
            border-bottom: 2px solid #333; 
            margin: 40px 0 20px; 
            padding-bottom: 10px; 
            font-size: 1.4em; 
            color: #adadb8; 
            font-weight: bold;
        }

        /* カードを並べるグリッド */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        
        /* 配信者カード本体 */
        .card { 
            background: #1f1f23; 
            border-radius: 10px; 
            overflow: hidden; 
            text-decoration: none; 
            color: white; 
            display: flex; 
            padding: 15px; 
            transition: all 0.2s ease-in-out; 
            border: 1px solid #2f2f35;
            position: relative;
        }

        .card:hover { 
            background: #26262c; 
            border-color: #9146ff; 
            transform: translateY(-3px); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 配信中のみ左端に赤い線を入れる */
        .card.live { 
            border-left: 5px solid #e91916; 
        }

        /* アイコン（アバター） */
        .avatar { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            margin-right: 15px; 
            background: #333; 
            flex-shrink: 0;
            border: 2px solid #333;
        }

        /* 情報エリア */
        .info { 
            flex: 1; 
            min-width: 0; /* 文字溢れ防止 */
        }

        .name-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 5px;
        }

        .name { 
            font-weight: bold; 
            font-size: 1.2em; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        /* ゲーム名と配信タイトル */
        .game { 
            color: #bf94ff; 
            font-size: 0.9em; 
            font-weight: bold;
            margin-bottom: 4px; 
        }

        .stream-title { 
            font-size: 0.85em; 
            color: #dedee3; 
            line-height: 1.4; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        /* 視聴者数 */
        .viewers { 
            color: #e91916; 
            font-size: 0.85em; 
            font-weight: bold; 
            margin-top: 8px; 
            display: flex;
            align-items: center;
        }

        .viewers::before {
            content: "●";
            margin-right: 5px;
        }

        /* LIVE/OFFLINEラベル */
        .label { 
            font-size: 0.7em; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold;
        }

        .label-live { background: #e91916; color: white; }
        .label-off { background: #333; color: #adadb8; }

        /* 読み込み中・エラーメッセージ */
        #loading-msg { text-align: center; margin-top: 50px; color: #adadb8; }
    </style>
</head>
<body>

    <h1>置換界隈 LIVE状況</h1>

    <div id="list">
        <p id="loading-msg">配信状況を確認中...</p>
    </div>

    <script src="script.js"></script>

</body>
</html>
